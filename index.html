<!DOCTYPE html>
<html>
<head>
    <title>Spend Limit Tracker</title>
    <!-- link the style sheet -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">
        <div class="header">
            <h1>Spend Limit Tracker</h1>
            <p>Track Your Monthly Credit Card Spending</p>
        </div>

        <div class="remaining-balance">
            <h2>Remaining Budget:</h2>
            <!-- Show the remaining budget -->
            <p id="budgetDisplay"></p>
        </div>

        <div class="charge-controls">
            <!-- <label for="chargeInput">Charge amount:</label> -->
            <input id="chargeInput" type="number" placeholder="Charge Amount">
            <button id="addChargeButton">Add Charge</button>
        </div>

        <div class="history_controls">
            <!-- show charges button -->
            <button id="toggleChargesButton">Show charges</button>
            <ul id="chargesList" hidden></ul>
        </div>

        <div class="budget-controls">
            <!-- <label for="budgetInput">Monthly budget:</label> -->
            <input id="budgetInput" type="number" placeholder="Monthly Budget">
            <button id="setBudgetButton">Set Budget</button>
        </div>

        <div class="reset-controls">
            <!-- creates button for monthly reset -->
            <button id="resetMonthButton">Reset Month</button>
        </div>

    </div>
    
    <script src="script.js"></script>
</body>
</html>
